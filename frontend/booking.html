<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Booking Center | A6 Cars</title>
  <meta http-equiv="refresh" content="0; url=/history.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/user.css" />
</head>
<body data-page="booking-alias">
  <section class="redirect-shell">
    <div class="redirect-card">
      <span class="hero-chip">Route Cleanup</span>
      <h1>Redirecting to the upgraded booking center.</h1>
      <p id="redirectCopy">Your older booking route now forwards into the single booking management page at `/history.html`.</p>
      <div class="hero-actions">
        <a class="button button-primary" href="/history.html">Open Booking Center</a>
        <button class="button button-secondary" type="button" data-action="alias-forward">Continue</button>
      </div>
    </div>
  </section>

  <div class="toast-root" id="toastRoot"></div>
  <div id="modalRoot"></div>

  <script src="/api-config.js"></script>
  <script src="/user.js"></script>
</body>
</html>
