# ============================
# Render Deployment Configuration
# A6 Cars Full Project
# Backend + Frontend
# ============================

services:
  # ---------------- BACKEND SERVICE ----------------
  - type: web
    name: a6cars-backend
    env: node
    rootDir: backend
    region: singapore
    buildCommand: "npm install"
    startCommand: "node server.js"
    plan: free
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://A6cars:Anu@a6cars.muz7zpm.mongodb.net/?appName=A6cars
      - key: MONGODB_DB_NAME
        value: a6cars
      - key: JWT_SECRET
        value: secret123
      - key: ADMIN_EMAIL
        value: karikeharikrishna@gmail.com
      - key: ADMIN_PASS
        value: Anu
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    autoDeploy: true

  # ---------------- FRONTEND SERVICE ----------------
  - type: web
    name: a6cars-frontend
    env: node
    rootDir: .
    buildCommand: "npm install"
    startCommand: "npm start"
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
    autoDeploy: true
